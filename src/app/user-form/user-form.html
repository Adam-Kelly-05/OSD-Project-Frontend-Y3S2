<mat-card>
	<form [formGroup]="userForm" (ngSubmit)="onSubmit()" class="userForm">
		<mat-form-field>
			<mat-label for="userName">Name:</mat-label>
			<input id="userName" type="text" formControlName="name" matInput/>
			<mat-error>Input Required</mat-error>
		</mat-form-field>
		<mat-form-field>
			<mat-label for="userPhoneNumber">Phone Number:</mat-label>
			<input id="userPhoneNumber" type="text" formControlName="phonenumber" matInput/>
		</mat-form-field>
		<mat-form-field>
			<mat-label for="userEmail">Email:</mat-label>
			<input id="userEmail" type="email" formControlName="email" matInput/>
		</mat-form-field>
		<mat-form-field>
			<mat-label for="userDob">Date of Birth:</mat-label>
			<input id="userDob" type="date" formControlName="dob" matInput/>
		</mat-form-field>
		<button type="submit" [disabled]="userForm.invalid" matButton="outlined">Submit</button>
	</form>
</mat-card>

<div>
   Values
   <p>{{ userForm.get('name')?.value }}</p>
   <p>{{ userForm.get('phonenumber')?.value }}</p>
   <p>{{ userForm.get('email')?.value }}</p>
   <p>{{ userForm.get('dob')?.value }}</p>
</div>
