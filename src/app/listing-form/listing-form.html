<mat-card>
  <form [formGroup]="listingForm" (ngSubmit)="onSubmit()" class="listing-form">
    <mat-form-field>
      <mat-label for="listingTitle">Title:</mat-label>
      <input id="listingTitle" type="text" formControlName="title" matInput />
      <mat-error>Input Required</mat-error>
    </mat-form-field>
    <mat-form-field>
      <mat-label for="listingDescription">Description:</mat-label>
      <input id="listingDescription" formControlName="description" matInput />
    </mat-form-field>
    <div>
      @if (description?.invalid && description?.touched) {
        <mat-error>Description must be at least 12 characters</mat-error>
      }
    </div>
    <mat-form-field>
      <mat-label for="listingImage">Image URL:</mat-label>
      <input id="listingImage" type="url" formControlName="image" matInput />
      <mat-error>Input Required</mat-error>
    </mat-form-field>
    <mat-form-field>
      <mat-label for="listingPrice">Price:</mat-label>
      <input id="listingPrice" type="number" formControlName="price" matInput />
      <mat-error>Input Required</mat-error>
    </mat-form-field>
    <button type="submit" [disabled]="listingForm.invalid" mat-stroked-button>Submit</button>
  </form>
</mat-card>
