<h2>All Users</h2>

<label for="userIdSearchString">Search User<br></label>
<input id="userIdSearchString" type="text" [(ngModel)]="searchId" placeholder="Enter users ID"/>

@if (users$ | async; as users) {

<ul>
  @for (user of users; track user._id) {
    @if (!searchId || user._id?.includes(searchId)) {
      <li>{{ user.name }} {{ user._id }}</li>

      <a [routerLink] = "['/user-list',user._id]" >VIEW DETAILS</a>
    }
  }
</ul>
}
@else {
  Loading users...
}
