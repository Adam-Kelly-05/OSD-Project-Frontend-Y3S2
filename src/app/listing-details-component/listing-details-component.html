<h1>Listing Details</h1>
@if (listing$ | async; as listing) {
  <mat-card>
    <mat-card-title>
      {{ listing.title }}
    </mat-card-title>
    <mat-card-content>
      <p>Id: {{ listing._id }}</p>
      <p>Description: {{ listing.description }}</p>
      <img [src]="listing.image" alt="{{ listing.title }}" width="200"/>
      <p>Price: {{ listing.price }}</p>
      <p>Posted by User Id: {{ listing.posterUser }}</p>
      <p>Date posted: {{ listing.datePosted }}</p>
      <button mat-flat-button color="error" (click)="deleteListing()">Delete</button>
    </mat-card-content>
  </mat-card>
  <app-listing-form [listing]="listing"></app-listing-form>
}
