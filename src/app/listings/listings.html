@if (listings$ | async; as listings) {
  <div class="listings-grid">
    @for (listing of listings; track listing._id) {
      @if (
        !listingSearch.searchId() ||
        listing.title.toLowerCase().includes(listingSearch.searchId().toLowerCase())
      ) {
        <mat-card [routerLink]="['/listing-list', listing._id]" style="cursor: pointer">
          <mat-card-content>
            <img [src]="listing.image" [alt]="listing.title" class="listing-image" />
            <mat-card-title>{{ listing.title }}</mat-card-title>
            <p class="listing-price">€{{ listing.price }}</p>
          </mat-card-content>
        </mat-card>
      }
    }
  </div>
} @else {
  Loading listings...
}
